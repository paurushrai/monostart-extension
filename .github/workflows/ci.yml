name: CI

# Quality gate for MonoStart: lint, typecheck, tests, and a build smoke check.
# This is the status check `main` branch protection should require.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'
          cache: npm

      - name: Check version sync (package.json == manifest.json)
        run: |
          PKG=$(node -p "require('./package.json').version")
          MAN=$(node -p "require('./public/manifest.json').version")
          echo "package=$PKG manifest=$MAN"
          if [ "$PKG" != "$MAN" ]; then
            echo "::error::Version mismatch — package.json ($PKG) and public/manifest.json ($MAN) must match"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
