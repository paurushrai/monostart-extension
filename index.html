<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MonoStart - A hyper-customizable, premium browser dashboard and start page built by Paurush Rai. Elevate your productivity with embedded widgets and instant access." />
    <meta name="author" content="Paurush Rai" />
    <meta name="theme-color" content="#202124" />
    <meta property="og:title" content="MonoStart" />
    <meta property="og:description" content="A premium browser dashboard to supercharge your productivity." />
    <meta property="og:type" content="website" />
    <title>MonoStart</title>
    <style>
      /* First-frame paint only: theme-init.js sets the theme vars before
         first paint, so this matches the user's theme exactly; fallbacks
         mirror the Default seed. The shift term mirrors --surface-shift in
         index.css. :where() keeps specificity at zero so the bundled
         `html { bg-background }` rule wins once the stylesheet loads —
         hardcoded colors here go stale and show through as a second shade. */
      :where(html) {
        background-color: hsl(var(--theme-hue, 0) var(--theme-sat, 0%)
          calc(94% + clamp(-4%, (var(--theme-lum, 30%) - 50%) / 6, 4%) * (1 - var(--theme-sat-factor, 0))));
      }
      :where(html.dark) {
        background-color: hsl(var(--theme-hue, 0) var(--theme-sat, 0%)
          calc(10% + clamp(-4%, (var(--theme-lum, 30%) - 50%) / 6, 4%) * (1 - var(--theme-sat-factor, 0))));
      }
    </style>
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
