<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MonoStart - A hyper-customizable, premium browser dashboard and start page built by Paurush Rai. Elevate your productivity with embedded widgets and instant access." />
    <meta name="author" content="Paurush Rai" />
    <meta name="theme-color" content="#202124" />
    <meta property="og:title" content="MonoStart" />
    <meta property="og:description" content="A premium browser dashboard to supercharge your productivity." />
    <meta property="og:type" content="website" />
    <title>MonoStart</title>
    <style>
      html { background-color: hsl(220, 14%, 94%); }
      html.dark { background-color: hsl(240, 5%, 10%); }
    </style>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('dashboardSettings');
          var settings = raw ? JSON.parse(raw) : {};
          var mode = settings.themeMode || 'device';
          var isDark = mode === 'dark' || (mode === 'device' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
